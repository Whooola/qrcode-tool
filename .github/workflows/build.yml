name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: |
          cd src-tauri
          cargo build --release --target aarch64-apple-darwin

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: qrcode-tool-macos
          path: src-tauri/target/aarch64-apple-darwin/release/qrcode-tool

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: |
          cd src-tauri
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: qrcode-tool-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/qrcode-tool.exe
