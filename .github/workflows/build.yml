name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Debug bundle path
        run: find src-tauri/target -name "*.dmg" -o -name "*.app" -type d 2>/dev/null | head -10

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrcode-tool-macos
          path: src-tauri/target/**/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Debug bundle path
        run: dir /s /b src-tauri\target\*.msi 2>nul || echo "No msi found"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrcode-tool-windows
          path: src-tauri/target/**/bundle/msi/*.msi
